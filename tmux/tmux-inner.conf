# inner tmux — used by tmux-inner-*.sh on isolated sockets

# prefix (match outer)
set -g prefix C-b
unbind C-a
bind C-b send-prefix

# basics
set -g mouse on
set -sg escape-time 0
set -g repeat-time 200
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi
set -g renumber-windows on
set -g allow-passthrough on
set -g aggressive-resize on
set -g default-size 240x60
set -g focus-events on

# truecolor
set -g default-terminal "tmux-256color"
set -ga terminal-overrides '*:Tc'

# clipboard
set -g set-clipboard on

# auto-respawn dead panes
set -g remain-on-exit on
set-hook -g pane-died 'respawn-pane -k'

# activity
setw -g monitor-activity on
setw -g monitor-bell on
set -g visual-activity off
set -g visual-bell off

# colours (Catppuccin Mocha — slimmed)
set -g @cp_bg      "#1e1e2e"
set -g @cp_fg      "#cdd6f4"
set -g @cp_blue    "#89b4fa"
set -g @cp_lav     "#b4befe"
set -g @cp_pink    "#f5c2e7"
set -g @cp_yellow  "#f9e2af"

# status — pink accent so inner sessions stand out
set -g status-interval 5
set -g status-position bottom
set -g status-justify centre
set -g status-style "bg=#{@cp_bg},fg=#{@cp_fg}"
set -g status-left-length 40
set -g status-left "#[bg=#{@cp_pink},fg=#{@cp_bg},bold] inner:#S #[bg=#{@cp_bg},fg=#{@cp_pink}] "
setw -g window-status-format "#[bg=#{@cp_bg},fg=#{@cp_fg}] #I:#W "
setw -g window-status-current-format "#[bg=#{@cp_lav},fg=#{@cp_bg},bold] #I:#W #[bg=#{@cp_bg},fg=#{@cp_lav}]"
setw -g window-status-separator ""
set -g status-right-length 60
set -g status-right "#[fg=#{@cp_fg}]%H:%M #[fg=#{@cp_yellow}]#h "
setw -g window-status-activity-style "fg=#{@cp_yellow},bg=#{@cp_bg},bold"

# splits / nav
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind -r C-Left  resize-pane -L 3
bind -r C-Right resize-pane -R 3
bind -r C-Up    resize-pane -U 3
bind -r C-Down  resize-pane -D 3

# quick swaps
bind Tab   last-window
bind Space last-pane

# popup shell
bind Enter display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "zsh -l"

# pick a host from @host_options and open it in a new window
bind H display-popup -E -w 60% -h 60% "~/.config/tmux/tmux-inner-pick.sh"

# reload
bind r source-file ~/.config/tmux/tmux-inner.conf \; display "Reloaded inner"
