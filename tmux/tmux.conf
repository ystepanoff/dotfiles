# prefix
set -g prefix C-b
unbind C-a
bind C-b send-prefix

# shell
set -g default-shell /bin/zsh
set -g default-command "reattach-to-user-namespace -l /bin/zsh"

# truecolor
set -g default-terminal "tmux-256color"
set -ga terminal-overrides '*:Tc'
set -ga terminal-features '*:extkeys'
set -g extended-keys on

# basic
set -g mouse on
set -sg escape-time 0
set -g repeat-time 200
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi
set -g renumber-windows on
set -g detach-on-destroy off
set -g allow-passthrough on
set -g aggressive-resize on
set -g default-size 240x60
set -g focus-events on

# pane-died: respawn shell instead of leaving "pane is dead"
set -g remain-on-exit on
set-hook -g pane-died 'respawn-pane -k "reattach-to-user-namespace -l /bin/zsh"'

# activity / bell
setw -g monitor-activity on
setw -g monitor-bell on
set -g visual-activity off
set -g visual-bell off

# SSH agent freshness across reattach. New shells get fresh env vars;
# existing panes may still hold a stale SSH_AUTH_SOCK — re-export by hand
# if you reattach after the original agent is gone.
set -g update-environment "SSH_AUTH_SOCK SSH_CONNECTION SSH_AGENT_PID DISPLAY"

# colours
set -g @catppuccin_mocha_bg      "#1e1e2e"
set -g @catppuccin_mocha_fg      "#cdd6f4"
set -g @catppuccin_mocha_blue    "#89b4fa"
set -g @catppuccin_mocha_lav     "#b4befe"
set -g @catppuccin_mocha_pink    "#f5c2e7"
set -g @catppuccin_mocha_green   "#a6e3a1"
set -g @catppuccin_mocha_yellow  "#f9e2af"
set -g @catppuccin_mocha_surface "#313244"

# per-session accent: dijon=blue, home=green, anything else=lavender
set -g @session_accent "#{?#{==:#S,dijon},#{@catppuccin_mocha_blue},#{?#{==:#S,home},#{@catppuccin_mocha_green},#{@catppuccin_mocha_lav}}}"

# status line
set -g status-interval 5
set -g status-position bottom
set -g status-justify centre
set -g status-style "bg=#{@catppuccin_mocha_bg},fg=#{@catppuccin_mocha_fg}"
set -g status-left-length 40
set -g status-left "#[bg=#{E:@session_accent},fg=#{@catppuccin_mocha_bg},bold] #S #[bg=#{@catppuccin_mocha_bg},fg=#{E:@session_accent}] "
setw -g window-status-format "#[bg=#{@catppuccin_mocha_bg},fg=#{@catppuccin_mocha_fg}] #I:#W "
setw -g window-status-current-format "#[bg=#{@catppuccin_mocha_lav},fg=#{@catppuccin_mocha_bg},bold] #I:#W #[bg=#{@catppuccin_mocha_bg},fg=#{@catppuccin_mocha_lav}]"
setw -g window-status-separator ""
set -g status-right-length 200
set -g status-right "#[fg=#{@catppuccin_mocha_yellow}] #{cpu_percentage} #[fg=#{@catppuccin_mocha_pink}]#{battery_icon} #{battery_percentage} #[fg=#{@catppuccin_mocha_green}]↓#{download_speed} ↑#{upload_speed} #[fg=#{@catppuccin_mocha_surface},bg=#{@catppuccin_mocha_bg}]#[fg=#{@catppuccin_mocha_fg},bg=#{@catppuccin_mocha_surface}] %Y-%m-%d %H:%M #[fg=#{@catppuccin_mocha_pink}]#[fg=#{@catppuccin_mocha_fg}]#h "
setw -g window-status-activity-style "fg=#{@catppuccin_mocha_yellow},bg=#{@catppuccin_mocha_bg},bold"
setw -g window-status-bell-style "fg=#{@catppuccin_mocha_pink},bg=#{@catppuccin_mocha_bg},bold"

# clipboard (macOS)
set -g set-clipboard on

# splits — open in current pane's path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# resize
bind -r C-Left  resize-pane -L 3
bind -r C-Right resize-pane -R 3
bind -r C-Up    resize-pane -U 3
bind -r C-Down  resize-pane -D 3

# pane navigation
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# quick swaps
bind Tab   last-window
bind Space last-pane

# windows
bind c new-window -c "#{pane_current_path}"
bind x kill-pane
bind & kill-window
bind n next-window
bind p previous-window

# sessions
bind S choose-session
bind R command-prompt -I "#S" "rename-session '%%'"
bind C command-prompt -p "New session name:" "new-session -s '%%'"

# popups
bind Enter display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "zsh -l"
bind g     display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"

# reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded tmux.conf"

# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-net-speed'
set -g @plugin 'christoomey/vim-tmux-navigator'

# resurrect / continuum
set -g @resurrect-dir "$HOME/.tmux/resurrect"
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes 'ssh "~ssh-loop.sh" "~ssh-loop"'
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'

# tmux-thumbs (default 'space' conflicts with last-pane)
set -g @thumbs-key u

run '~/.tmux/plugins/tpm/tpm'
