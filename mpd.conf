# An example configuration file for MPD.
# Read the user manual for documentation: http://www.musicpd.org/doc/user/
# or /usr/share/doc/mpd/html/user.html


music_directory				"/home/conway/music"
playlist_directory			"/home/conway/.mpd/playlists"
db_file					"/home/conway/.mpd/tag_cache"
log_file				"/home/conway/.mpd/mpd.log"
pid_file				"/home/conway/.mpd/pid"
state_file				"/home/conway/.mpd/state"
sticker_file				"/home/conway/.mpd/sticker.sql"
user					"conway"
bind_to_address				"0.0.0.0"
port					"6600"
auto_update				"yes"
mixer_type				"software"
#log_level				"notice"
#restore_paused				"no"
#save_absolute_paths_in_playlists	"no"
#metadata_to_use			"artist,album,title,track,name,genre,date,composer,performer,disc"
#metadata_to_use			"+comment"
#auto_update				"yes"
#auto_update_depth			"3"
#follow_outside_symlinks		"yes"
#follow_inside_symlinks			"yes"

#zeroconf_enabled			"yes"
#zeroconf_name				"Music Player @ %h"


#password				"password@read,add,control,admin"
#default_permissions			"read,add,control,admin"


#database {
#       plugin "simple"
#       path "/var/lib/mpd/tag_cache"
#       cache_directory "/var/lib/mpd/cache"
#}

#music_directory "nfs://fileserver.local/srv/mp3"
#database {
#       plugin "proxy"
#       host "other.mpd.host"
#       port "6600"
#}

input {
        plugin "curl"
#       proxy "proxy.isp.com:8080"
#       proxy_user "user"
#       proxy_password "password"
}

decoder {
        plugin                  "hybrid_dsd"
        enabled                 "no"
#       gapless                 "no"
}
decoder {
        plugin        "wildmidi"
        enabled       "no"
        #config_file "/etc/timidity/timidity.cfg"
}

